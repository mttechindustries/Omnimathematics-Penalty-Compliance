name: Active Stability Controller Tests

on:
  push:
    branches: [main]
    paths:
      - "active_stability_controller/**"
      - ".github/workflows/active-stability-controller-tests.yml"
  pull_request:
    paths:
      - "active_stability_controller/**"
      - ".github/workflows/active-stability-controller-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: active_stability_controller
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: active_stability_controller/pyproject.toml
      - name: Install package and tests
        run: python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest -q
